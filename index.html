<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="منصة إدارة المدارس الذكية — إدارة الطلاب والمعلمين والحضور والرسائل في مكان واحد." />
    <meta name="author" content="عبدالرحمن سيد فوزي" />
    <meta name="keywords" content="إدارة مدرسة, نظام مدرسي, SaaS, تعليم, حضور, معلمين, أولياء أمور" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="المدرسة" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="النظام الذكي — نظام إدارة المدارس المتكامل" />
    <meta property="og:description" content="منصة احترافية لإدارة المدارس والتحصيل العلمي." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ar_EG" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="النظام الذكي" />
    <meta name="twitter:description" content="نظام إدارة المدارس الذكي" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <!-- ✅ Unified Global Loader (Silent & Professional) -->
    <div id="unified-loader" class="unified-loader">
      <div class="loader-content">
        <div class="loader-icon-box">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="loader-svg"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        </div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
      </div>

      <style>
        .unified-loader {
          position: fixed; inset: 0; z-index: 9999;
          display: flex; align-items: center; justify-content: center;
          background-color: #0a0f1e; font-family: 'Cairo', sans-serif;
          transition: opacity 0.4s ease-out;
        }
        .unified-loader.fade-out { opacity: 0; pointer-events: none; }
        .loader-content { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .loader-icon-box { 
          width: 64px; height: 64px; 
          background: rgba(99, 102, 241, 0.1); 
          border-radius: 20px; 
          display: flex; align-items: center; justify-content: center;
          border: 1px solid rgba(99, 102, 241, 0.2);
        }
        .loader-svg { animation: pulse 2s infinite ease-in-out; }
        .loader-bar { width: 120px; height: 3px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; overflow: hidden; }
        .loader-progress { height: 100%; width: 40%; background: #6366f1; animation: move 2s infinite linear; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
        @keyframes move { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
      </style>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
